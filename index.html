<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consulta de Documentos</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 40px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
  padding: 12px;
  width: 80%;
  margin: 10px 0;
  font-size: 16px;
}

button {
  padding: 12px 20px;
  background: #1a73e8;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #eee;
}

.pendente {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>Centro Universitário Fundação de Ensino Octávio Bastos - UNIFEOB</h2>
  <p>Consulta de Documentos Pendentes</p>

  <input id="ra" placeholder="Digite seu RA">
  <br>
  <button onclick="consultar()">Consultar</button>

  <div id="resultado"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxm-3MFgLqcD8agXxFSsNnLiJaeLan4wVBx33eWcoQmefALoKBoqMAIr1zIO3aNQMCt/exec";

function consultar() {
  const ra = document.getElementById("ra").value;

  if (!ra) {
    alert("Digite o RA");
    return;
  }

  document.getElementById("resultado").innerHTML = "Carregando...";

  fetch(API + "?ra=" + ra)
    .then(res => res.json())
    .then(data => {

      if (data.erro) {
        document.getElementById("resultado").innerHTML = "<p>" + data.erro + "</p>";
        return;
      }

      let html = `
        <p><strong>RA:</strong> ${data.ra}</p>
        <p><strong>Curso:</strong> ${data.curso}</p>
      `;

      if (data.pendencias.length === 0) {
        html += `<p style="color:green;"><strong>✅ Nenhuma pendência</strong></p>`;
      } else {

        html += `<p class="pendente">⚠️ Pendências encontradas:</p>`;

        html += `<table>
          <tr><th>Documento</th><th>Status</th></tr>
        `;

        data.pendencias.forEach(d => {
          html += `<tr>
            <td>${d.nome}</td>
            <td class="pendente">${d.status}</td>
          </tr>`;
        });

        html += "</table>";
      }

      document.getElementById("resultado").innerHTML = html;
    });
}
</script>

</body>
</html>
